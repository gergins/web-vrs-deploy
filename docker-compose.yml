services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: vrs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  redis:
    image: redis:7
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  coturn:
    image: coturn/coturn
    restart: always
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./infra/turn/turnserver.conf:/etc/coturn/turnserver.conf
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.example
    depends_on:
      - api

  nginx:
    image: nginx:stable
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - api
